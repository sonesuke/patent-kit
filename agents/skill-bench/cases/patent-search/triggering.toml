# Test Case: Patent Search - Triggering

name = "triggering"
description = "Verify patent-search skill is triggered when searching for patents"
timeout = 60

test_prompt = """
I need to search for patents about artificial intelligence.
"""

[[checks]]
name = "mcp_server_loaded"
type = "script"
command = "check-mcp-loaded.sh google-patent-cli"

[[checks]]
name = "skill_loaded"
type = "script"
command = "check-skill-loaded.sh patent-search"

[[checks]]
name = "patent_search_invoked"
type = "script"
command = "check-skill-invoked.sh patent-search"

[[checks]]
name = "patent_search_mcp_succeeded"
type = "script"
command = "check-mcp-success.sh search_patents"
