# Test Case: Evaluating - Select Patent ID

name = "functional-select-patent-id"
description = "Verify evaluating skill can select next relevant patent without evaluation"
timeout = 180

test_prompt = """
I have several screened patents in the database. Some are marked as relevant but have not been evaluated yet.

Please:
1. Select the next relevant patent that has not been evaluated
2. Report the patent ID and title
"""

[[setup]]
path = "screened-patents.sql"
content = """
-- Initialize database
PRAGMA foreign_keys = ON;

-- Insert target patents
INSERT OR IGNORE INTO target_patents (patent_id, title, assignee, country, publication_date, filing_date, grant_date, extra_fields)
VALUES
    ('US20240292070A1', 'Iterative AI prompt optimization', 'Loop Now Technologies, Inc.', 'US', '2024-08-29', '2024-04-10', NULL, '{"source": "test"}'),
    ('US20240346271A1', 'Conversational AI System', 'Tech Corp', 'US', '2024-10-03', '2024-05-01', NULL, '{"source": "test"}'),
    ('US20240412345A1', 'Database Management System', 'Data Inc', 'US', '2024-11-15', '2024-06-01', NULL, '{"source": "test"}');

-- Insert screened patents (2 relevant, 1 irrelevant)
INSERT OR IGNORE INTO screened_patents (patent_id, judgment, reason, abstract_text, screened_at, updated_at)
VALUES
    ('US20240292070A1', 'relevant', 'Relates to AI prompt optimization', 'Systems and methods for optimizing AI prompts', datetime('now'), datetime('now')),
    ('US20240346271A1', 'relevant', 'Relates to conversational AI', 'A conversational AI system', datetime('now'), datetime('now')),
    ('US20240412345A1', 'irrelevant', 'Not related to target domain', 'Database management system', datetime('now'), datetime('now'));

-- Simulate that one patent has been evaluated (evaluation directory exists)
-- We'll create the directory in setup
"""

[[setup]]
name = "init_db"
type = "script"
command = "setup-db.sh init"

[[setup]]
name = "load_screened_data"
type = "script"
command = "setup-db.sh execute screened-patents.sql"

[[setup]]
name = "create_evaluation_directory"
type = "script"
command = "mkdir -p 3-investigations/US20240292070A1"

[[checks]]
name = "database_created"
type = "script"
command = "check-workspace-file.sh patents.db"

[[checks]]
name = "relevant_patents_exist"
type = "script"
command = "check-db-query.sh {} {} '2' 'SELECT COUNT(*) FROM screened_patents WHERE judgment = \"relevant\";'"

[[checks]]
name = "patent_selected"
type = "script"
command = "check-db-query.sh {} {} 'US20240346271A1' 'SELECT patent_id FROM screened_patents WHERE judgment = \"relevant\" AND patent_id NOT IN (SELECT DISTINCT SUBSTR(path, LENGTH(\"3-investigations/\") + 1, INSTR(SUBSTR(path, LENGTH(\"3-investigations/\") + 1), \"/\") - 1) FROM (SELECT path FROM fsdir WHERE path LIKE \"3-investigations/%\")) ORDER BY screened_at ASC LIMIT 1;'"
