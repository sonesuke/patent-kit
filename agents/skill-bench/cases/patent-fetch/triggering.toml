# Test Case: Patent Fetch - Triggering

name = "triggering"
description = "Verify patent-fetch skill is triggered when fetching patent details"
timeout = 60

test_prompt = """
Fetch patent details for US9152718B2.
"""

[[checks]]
name = "mcp_server_loaded"
type = "script"
command = "check-mcp-loaded.sh google-patent-cli"

[[checks]]
name = "skill_loaded"
type = "script"
command = "check-skill-loaded.sh patent-fetch"

[[checks]]
name = "patent_fetch_invoked"
type = "script"
command = "check-skill-invoked.sh patent-fetch"

[[checks]]
name = "fetch_patent_mcp_succeeded"
type = "script"
command = "check-mcp-success.sh fetch_patent"
