# Test Case: Constitution Reminding Functional

name = "functional"
description = "Verify constitution-reminding loads and displays core principles"
timeout = 60 # seconds

test_prompt = """
Load the constitution skill to understand the core principles.
"""

[[checks]]
name = "mcp_server_loaded"
type = "script"
command = "check-mcp-loaded.sh google-patent-cli"

[[checks]]
name = "skill_loaded"
type = "script"
command = "check-skill-loaded.sh constitution-reminding"

[[checks]]
name = "constitution_reminding_invoked"
type = "script"
command = "check-skill-invoked.sh constitution-reminding"

[[checks]]
name = "references_instructions_read"
type = "script"
command = "check-tool-use.sh Read file_path \"constitution-reminding.*references/instructions.md\""

[[checks]]
name = "constitution_text_displayed"
type = "script"
command = "check-text-contains.sh \"I.\" \"II.\" \"III.\""
