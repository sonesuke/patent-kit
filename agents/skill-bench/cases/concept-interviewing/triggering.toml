# Test Case: Concept Interview - Triggering

name = "triggering"
description = "Verify concept-interviewing skill is triggered when discussing patent search"
timeout = 60

test_prompt = """
I want to define search requirements for a new voice recognition system in the US, releasing in 2025. Competitors are Google and Amazon. The system is for smart home devices with real-time transcription and noise-resistant recognition.
"""

