# Test Case: Investigating Database - Record Screening

name = "functional-record-screening"
description = "Verify investigating-database can record screening results"
timeout = 120                                                              # seconds

test_prompt = """
Record a screening result for patent US1234567A with judgment 'relevant' and reason 'Core technology for LLM systems'.
"""

[[setup]]
path = "patents.db"
content = """
#!/usr/bin/env bash
# Setup script to create test database
sqlite3 patents.db <<EOF
PRAGMA foreign_keys = ON;
CREATE TABLE target_patents (
    id TEXT PRIMARY KEY NOT NULL,
    family_id TEXT,
    title TEXT,
    abstract_text TEXT,
    publication_date TEXT,
    country TEXT,
    assignee TEXT,
    filing_date TEXT,
    grant_date TEXT,
    citation_count INTEGER,
    claim_count INTEGER,
    extra_fields TEXT,
    created_at TEXT DEFAULT (datetime('now')),
    updated_at TEXT DEFAULT (datetime('now'))
);
CREATE TABLE screened_patents (
    id TEXT PRIMARY KEY NOT NULL,
    title TEXT,
    legal_status TEXT,
    judgment TEXT NOT NULL,
    reason TEXT,
    abstract_text TEXT,
    screened_at TEXT DEFAULT (datetime('now')),
    updated_at TEXT DEFAULT (datetime('now'))
);
INSERT INTO target_patents (id, family_id, title, abstract_text, publication_date, country, assignee) VALUES
('US1234567A', 'US1234567', 'LLM-based Chatbot System', 'A multi-turn chatbot system using LLM.', '2023-01-15', 'US', 'TechCorp');
EOF
"""

[[checks]]
name = "skill_loaded"
type = "script"
command = "check-skill-loaded.sh investigating-database"

[[checks]]
name = "investigating_database_invoked"
type = "script"
command = "check-skill-invoked.sh investigating-database"

[[checks]]
name = "record_screening_script_executed"
type = "script"
command = "check-tool-use.sh Bash command \"record-screening.sh\""

[[checks]]
name = "screening_result_recorded"
type = "script"
command = """
#!/usr/bin/env bash
if [ -f "patents.db" ]; then
    RESULT=$(sqlite3 patents.db "SELECT judgment FROM screened_patents WHERE id = 'US1234567A';" 2>/dev/null || echo "")
    if [ "$RESULT" = "relevant" ]; then
        exit 0
    fi
fi
exit 1
"""

[[checks]]
name = "reason_recorded"
type = "script"
command = """
#!/usr/bin/env bash
if [ -f "patents.db" ]; then
    RESULT=$(sqlite3 patents.db "SELECT reason FROM screened_patents WHERE id = 'US1234567A';" 2>/dev/null || echo "")
    if echo "$RESULT" | grep -qi "core"; then
        exit 0
    fi
fi
exit 1
"""
