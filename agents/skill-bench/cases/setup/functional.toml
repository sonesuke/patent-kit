# Test Case: Setup Functional

name = "functional"
description = "Verify setup creates project directories and reads instructions"
timeout = 60 # seconds

test_prompt = """
Initialize the project directories.
"""

[[checks]]
name = "mcp_server_loaded"
type = "script"
command = "check-mcp-loaded.sh google-patent-cli"

[[checks]]
name = "skill_loaded"
type = "script"
command = "check-skill-loaded.sh setup"

[[checks]]
name = "setup_invoked"
type = "script"
command = "check-skill-invoked.sh setup"

[[checks]]
name = "references_instructions_read"
type = "script"
command = "check-tool-use.sh Read file_path \"setup.*references/instructions.md\""

[[checks]]
name = "directories_created"
type = "script"
command = "check-workspace-dir.sh 0-specifications 1-targeting/csv 1-targeting/json 2-screening/json 3-investigations"
