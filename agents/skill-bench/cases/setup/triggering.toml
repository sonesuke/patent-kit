# Test Case: Setup - Triggering

name = "triggering"
description = "Verify setup skill is triggered when asked to initialize project"
timeout = 60

test_prompt = """
Initialize the project directories.
"""

[[checks]]
name = "mcp_server_loaded"
type = "script"
command = "check-mcp-loaded.sh google-patent-cli"

[[checks]]
name = "skill_loaded"
type = "script"
command = "check-skill-loaded.sh setup"

[[checks]]
name = "setup_invoked"
type = "script"
command = "check-skill-invoked.sh setup"
