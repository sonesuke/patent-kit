[[checks]]
name = "constitution_loaded"
type = "script"
command = "check-skill-loaded.sh constitution-reminding"

[[checks]]
name = "all_patents_screened"
type = "script"
command = "check-db-query.sh {} {} '3' 'SELECT COUNT(*) FROM screened_patents;'"

[[checks]]
name = "no_duplicates"
type = "script"
command = "check-db-query.sh {} {} '0' 'SELECT patent_id, COUNT(*) FROM screened_patents GROUP BY patent_id HAVING COUNT(*) > 1;'"
