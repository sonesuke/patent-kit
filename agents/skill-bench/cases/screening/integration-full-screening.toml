# Test Case: Screening - Full Integration

name = "integration-full-screening"
description = "Verify complete screening workflow from database init to completion"
timeout = 600 # seconds

[[setup]]
path = "0-specifications/specification.md"
content = '''
# Product Specification

**Product/Technology**:
LLM-based multi-turn chatbot system with RAG (Retrieval-Augmented Generation) capabilities.

**Key Technical Features**:

1. LLM-driven multi-turn conversation management
2. Vector database integration for retrieval-augmented generation
3. Automatic quality assurance for information retrieval and intent detection

**Domain**: AI/ML, Natural Language Processing, Conversational Systems

**Target Product**: Enterprise customer service chatbot platform

**Target Release Date**: 2025-12-31

**Priority Date Cutoff**: 2020-01-01
'''

[[setup]]
path = "test-patents.csv"
content = '''
search URL:,https://patents.google.com/?q=llm
id,title,assignee,inventor/author,priority date,filing/creation date,publication date,grant date,result link,representative figure link
KR-102637029-B1,Device for Generating Multi-turn Chat Bot Data Using LLM,주식회사 마인즈앤컴퍼니,"고석태, 백영상",2023-10-11,2023-10-11,2024-02-15,2024-02-15,https://patents.google.com/patent/KR102637029B1/en,
US-2024292070-A1,Iterative ai prompt optimization,"Loop Now Technologies, Inc.","Wu-Hsi Li, Edwin Chiu",2023-02-24,2024-04-10,2024-08-29,,https://patents.google.com/patent/US20240292070A1/en,
CN-123456789-A1,Medical Image Analysis System,"Beijing Medical Tech","Zhang San, Li Si",2023-05-10,2023-05-10,2024-01-20,,https://patents.google.com/patent/CN123456789A1/en,
US-9876543-B2,Surgical Robot Control System,"MedTech Inc.","Dr. Smith, Dr. Jones",2019-03-15,2019-03-15,2021-06-01,2021-08-15,https://patents.google.com/patent/US9876543B2/en,
'''

test_prompt = '''
Execute the complete screening workflow:

1. Load constitution-reminding and legal-checking skills
2. Initialize patent database and import test-patents.csv
3. Create a team of 2 agents for parallel screening
4. Screen all patents:
   - Fetch patent details using google-patent-cli:patent-fetch skill
   - Judge relevance based on specification (LLM/chatbot domain)
   - Record results using investigating-database skill
5. Wait for all agents to complete
6. Verify all patents are screened

Expected judgments:
- KR-102637029-B1: relevant (LLM chatbot technology)
- US-2024292070-A1: relevant (AI prompt optimization)
- CN-123456789-A1: irrelevant (medical imaging, different domain)
- US-9876543-B2: irrelevant (surgical robotics, different domain)
'''

[[checks]]
name = "constitution_loaded"
type = "script"
command = "check-skill-loaded.sh constitution-reminding"

[[checks]]
name = "legal_checker_loaded"
type = "script"
command = "check-skill-loaded.sh legal-checking"

[[checks]]
name = "investigating_database_loaded"
type = "script"
command = "check-skill-loaded.sh investigating-database"

[[checks]]
name = "google_patent_cli_invoked"
type = "script"
command = "check-skill-invoked.sh google-patent-cli"

[[checks]]
name = "database_created"
type = "script"
command = "check-workspace-file.sh patents.db"

[[checks]]
name = "patents_imported"
type = "script"
command = "check-db-query.sh {} {} '4' 'SELECT COUNT(*) FROM target_patents;'"

[[checks]]
name = "all_patents_screened"
type = "script"
command = "check-db-query.sh {} {} '4' 'SELECT COUNT(*) FROM screened_patents;'"

[[checks]]
name = "relevant_patents_count"
type = "script"
command = "check-db-query.sh {} {} '2' \"SELECT COUNT(*) FROM screened_patents WHERE judgment = 'relevant';\""

[[checks]]
name = "irrelevant_patents_count"
type = "script"
command = "check-db-query.sh {} {} '2' \"SELECT COUNT(*) FROM screened_patents WHERE judgment = 'irrelevant';\""

[[checks]]
name = "no_duplicates"
type = "script"
command = "check-db-query.sh {} {} '0' 'SELECT COUNT(*) FROM (SELECT patent_id, COUNT(*) as cnt FROM screened_patents GROUP BY patent_id HAVING cnt > 1);'"
