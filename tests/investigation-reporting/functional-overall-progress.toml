# Test Case: Investigation Reporting - Overall Progress Report

name = "functional-overall-progress"
description = "Verify investigation-reporting generates PROGRESS.md with pre-seeded database"
timeout = 300

test_prompt = """
I have a patent database with screening and evaluation results ready. Please generate an overall progress report for the current investigation.
"""

[[setup]]
command = """
sqlite3 patents.db < /workspaces/patent-kit/plugin/skills/investigation-preparing/references/sql/initialize-database.sql
sqlite3 patents.db "INSERT INTO target_patents (patent_id, title, country, publication_date) VALUES ('US12231380B1', 'Trigger-based transfer of conversations from a chatbot to a human agent', 'US', '2023-10-11');"
sqlite3 patents.db "INSERT INTO target_patents (patent_id, title, country, publication_date) VALUES ('US20230245651A1', 'Enabling user-centered and contextually relevant interaction', 'US', '2023-04-03');"
sqlite3 patents.db "INSERT INTO screened_patents (patent_id, judgment, legal_status, reason, abstract_text) VALUES ('US12231380B1', 'relevant', 'Pending', 'Related to chatbot-to-human transfer mechanism', 'A system for triggering transfer of conversations from a chatbot to a human agent based on conversation context.');"
sqlite3 patents.db "INSERT INTO screened_patents (patent_id, judgment, legal_status, reason, abstract_text) VALUES ('US20230245651A1', 'irrelevant', 'Pending', 'Not related to core product features', 'A method for enabling user-centered and contextually relevant interaction in conversational systems.');"
"""

[[setup]]
path = "specification.md"
content = """
# Product Specification

## 1. Product Concept

AI-powered customer support chatbot with real-time sentiment analysis.

## 2. Target Market

- **Country**: US
- **Release Date**: 2025-12-31
- **Priority Date Cutoff**: 2005-12-31

## 3. Competitors

| Canonical Name       | Variations Found in DB     | Verified? | Notes         |
| -------------------- | -------------------------- | --------- | ------------- |
| Salesforce.Com, Inc. | salesforce.com, inc        | Yes       | Main assignee |

## 4. Technical Elements (Constituent Features)

- **LLM Dialogue Engine**: Multi-turn conversation management with context retention
- **Real-Time Sentiment Analysis**: Detects customer frustration and escalates to human agents
- **CRM Integration API**: Connects to Salesforce for ticket creation and customer history retrieval
"""

[[checks]]
name = "skill_loaded"
command = { command = "skill-loaded", skill = "investigation-reporting" }

[[checks]]
name = "investigation_reporting_invoked"
command = { command = "skill-invoked", skill = "investigation-reporting" }

[[checks]]
name = "progress_file_created"
command = { command = "workspace-file", path = "PROGRESS.md", copy_to_output = true }

[[checks]]
name = "progress_has_screening_section"
command = { command = "file-contains", file = "PROGRESS.md", contains = "Screening" }

[[checks]]
name = "progress_has_claim_analysis_section"
command = { command = "file-contains", file = "PROGRESS.md", contains = "Claim Analysis" }

[[checks]]
name = "progress_has_prior_art_section"
command = { command = "file-contains", file = "PROGRESS.md", contains = "Prior Art" }

[[checks]]
name = "progress_has_next_actions"
command = { command = "file-contains", file = "PROGRESS.md", contains = "Next Actions" }

[[checks]]
name = "legal_checking_loaded"
command = { command = "skill-loaded", skill = "legal-checking" }

[[checks]]
name = "legal_checking_invoked"
command = { command = "skill-invoked", skill = "legal-checking" }
