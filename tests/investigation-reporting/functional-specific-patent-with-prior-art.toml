# Test Case: Investigation Reporting - Specific Patent Report with Prior Art

name = "functional-specific-patent-with-prior-art"
description = "Verify investigation-reporting generates a specific patent report with prior art data"
timeout = 300

test_prompt = """
I have investigation data for patent US12231380B1 including prior art research. Please generate a specific patent report for this patent.
"""

[[setup]]
command = """
sqlite3 patents.db < /workspaces/patent-kit/plugin/skills/investigation-preparing/references/sql/initialize-database.sql
sqlite3 patents.db "INSERT INTO target_patents (patent_id, title, country, publication_date) VALUES ('US12231380B1', 'Trigger-based transfer of conversations from a chatbot to a human agent', 'US', '2023-10-11');"
sqlite3 patents.db "INSERT INTO screened_patents (patent_id, judgment, legal_status, reason, abstract_text) VALUES ('US12231380B1', 'relevant', 'Pending', 'Related to chatbot-to-human transfer mechanism', 'A system for triggering transfer of conversations from a chatbot to a human agent based on conversation context.');"
sqlite3 patents.db "INSERT INTO claims (patent_id, claim_number, claim_type, claim_text) VALUES ('US12231380B1', 1, 'independent', '1. A computer-implemented method for managing conversations in a chatbot system, comprising: detecting a trigger condition in a conversation context; and transferring the conversation from the chatbot to a human agent based on the trigger condition.');"
sqlite3 patents.db "INSERT INTO elements (patent_id, claim_number, element_label, element_description) VALUES ('US12231380B1', 1, 'A', 'Detecting a trigger condition in a conversation context');"
sqlite3 patents.db "INSERT INTO elements (patent_id, claim_number, element_label, element_description) VALUES ('US12231380B1', 1, 'B', 'Transferring the conversation from the chatbot to a human agent based on the trigger condition');"
sqlite3 patents.db "INSERT INTO similarities (patent_id, claim_number, element_label, similarity_level, analysis_notes) VALUES ('US12231380B1', 1, 'A', 'Moderate', 'Partial overlap in trigger detection approach');"
sqlite3 patents.db "INSERT INTO similarities (patent_id, claim_number, element_label, similarity_level, analysis_notes) VALUES ('US12231380B1', 1, 'B', 'Significant', 'Core feature matches transfer mechanism');"
sqlite3 patents.db "INSERT INTO prior_arts (reference_id, reference_type, title, publication_date) VALUES ('US10915824B2', 'patent', 'System for managing communication sessions between automated and human agents', '2021-02-23');"
sqlite3 patents.db "INSERT INTO prior_art_elements (patent_id, claim_number, element_label, reference_id, relevance_level, analysis_notes, claim_chart) VALUES ('US12231380B1', 1, 'B', 'US10915824B2', 'Significant', 'D1 discloses transferring conversations based on sentiment triggers', 'D1 discloses detecting customer sentiment and routing to human agents via element B transfer mechanism');"
mkdir -p investigation/US12231380B1
"""

[[setup]]
path = "investigation/US12231380B1/evaluation.md"
content = """
# Patent Evaluation: US12231380B1

## Overall Similarity: Moderate

## Reasoning
The patent shares significant overlap in the conversation transfer mechanism but uses a different trigger detection approach compared to our product specification.
"""

[[setup]]
path = "investigation/US12231380B1/claim-analysis.md"
content = """
# Claim Analysis: US12231380B1

## Claim 1 (Independent)

### Element Analysis

| Element | Target Specification | Patent Disclosure | Verdict |
| -------- | -------------------- | ----------------- | ------- |
| A | Real-time sentiment monitoring as trigger | Detecting a trigger condition in conversation context | Partial |
| B | Transfer to human agent on frustration | Transferring conversation based on trigger condition | Present |
"""

[[setup]]
path = "specification.md"
content = """
# Product Specification

## 1. Product Concept

AI-powered customer support chatbot with real-time sentiment analysis.

## 2. Target Market

- **Country**: US
- **Release Date**: 2025-12-31
- **Priority Date Cutoff**: 2005-12-31

## 3. Competitors

| Canonical Name       | Variations Found in DB     | Verified? | Notes         |
| -------------------- | -------------------------- | --------- | ------------- |
| Salesforce.Com, Inc. | salesforce.com, inc        | Yes       | Main assignee |

## 4. Technical Elements (Constituent Features)

- **LLM Dialogue Engine**: Multi-turn conversation management with context retention
- **Real-Time Sentiment Analysis**: Detects customer frustration and escalates to human agents
- **CRM Integration API**: Connects to Salesforce for ticket creation and customer history retrieval
"""

[[checks]]
name = "skill_loaded"
command = { command = "skill-loaded", skill = "investigation-reporting" }

[[checks]]
name = "investigation_reporting_invoked"
command = { command = "skill-invoked", skill = "investigation-reporting" }

[[checks]]
name = "legal_checking_loaded"
command = { command = "skill-loaded", skill = "legal-checking" }

[[checks]]
name = "legal_checking_invoked"
command = { command = "skill-invoked", skill = "legal-checking" }

[[checks]]
name = "report_file_created"
command = { command = "workspace-file", path = "US12231380B1.md", copy_to_output = true }

[[checks]]
name = "report_contains_patent_id"
command = { command = "file-contains", file = "US12231380B1.md", contains = "US12231380B1" }

[[checks]]
name = "report_contains_similarity"
command = { command = "file-contains", file = "US12231380B1.md", contains = "Similarity" }

[[checks]]
name = "report_contains_element_analysis"
command = { command = "file-contains", file = "US12231380B1.md", contains = "Element" }

[[checks]]
name = "report_contains_prior_art"
command = { command = "file-contains", file = "US12231380B1.md", contains = "Prior Art" }

