# Test Case: Evaluating Functional (with pre-seeded database)

name = "functional"
description = "Verify evaluating skill with pre-populated screened_patents in database"
timeout = 300 # seconds

test_prompt = """
I have a patent database with screened relevant patents and a specification ready. Please evaluate the patents by decomposing their claims into elements.
"""

[[setup]]
command = """
sqlite3 patents.db < /workspaces/patent-kit/plugin/skills/investigation-preparing/references/sql/initialize-database.sql
sqlite3 patents.db "INSERT INTO target_patents (patent_id, title, country, publication_date) VALUES ('US12231380B1', 'Trigger-based transfer of conversations from a chatbot to a human agent', 'US', '2023-10-11');"
sqlite3 patents.db "INSERT INTO target_patents (patent_id, title, country, publication_date) VALUES ('US20230245651A1', 'Enabling user-centered and contextually relevant interaction', 'US', '2023-04-03');"
sqlite3 patents.db "INSERT INTO screened_patents (patent_id, judgment, legal_status, reason, abstract_text) VALUES ('US12231380B1', 'relevant', 'Pending', 'Related to chatbot-to-human transfer mechanism', 'A system for triggering transfer of conversations from a chatbot to a human agent based on conversation context.');"
sqlite3 patents.db "INSERT INTO screened_patents (patent_id, judgment, legal_status, reason, abstract_text) VALUES ('US20230245651A1', 'relevant', 'Pending', 'Related to user interaction and context management', 'A method for enabling user-centered and contextually relevant interaction in conversational systems.');"
"""

[[setup]]
path = "specification.md"
content = """
# Product Specification

## 1. Product Concept

AI-powered customer support chatbot with real-time sentiment analysis.

## 2. Target Market

- **Country**: US
- **Release Date**: 2025-12-31
- **Priority Date Cutoff**: 2005-12-31

## 3. Competitors

| Canonical Name       | Variations Found in DB     | Verified? | Notes         |
| -------------------- | -------------------------- | --------- | ------------- |
| Salesforce.Com, Inc. | salesforce.com, inc        | Yes       | Main assignee |

## 4. Technical Elements (Constituent Features)

- **LLM Dialogue Engine**: Multi-turn conversation management with context retention
- **Real-Time Sentiment Analysis**: Detects customer frustration and escalates to human agents
- **CRM Integration API**: Connects to Salesforce for ticket creation and customer history retrieval
"""

[[checks]]
name = "skill_loaded"
command = { command = "skill-loaded", skill = "evaluating" }

[[checks]]
name = "evaluating_invoked"
command = { command = "skill-invoked", skill = "evaluating" }

[[checks]]
name = "fetching_loaded"
command = { command = "skill-loaded", skill = "investigation-fetching" }

[[checks]]
name = "recording_loaded"
command = { command = "skill-loaded", skill = "investigation-recording" }

[[checks]]
name = "patent_fetch_invoked"
command = { command = "mcp-tool-invoked", tool = "fetch_patent" }
