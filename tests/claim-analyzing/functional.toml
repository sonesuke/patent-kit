# Test Case: Claim Analyzing Functional (feature found via question-responder)

name = "functional"
description = "Verify claim-analyzing skill asks about missing features and records analysis"
timeout = 300 # seconds

test_prompt = """
I have a patent database with evaluated patents and product features ready. Please perform claim analysis by comparing product features against patent elements.

Before asking me any questions about missing features, please use the question-responder skill to check if the required information is already available.
"""

[[setup]]
command = """
sqlite3 patents.db < /workspaces/patent-kit/plugin/skills/investigation-preparing/references/sql/initialize-database.sql
sqlite3 patents.db "INSERT INTO target_patents (patent_id, title, country, publication_date) VALUES ('US12231380B1', 'Trigger-based transfer of conversations from a chatbot to a human agent', 'US', '2023-10-11');"
sqlite3 patents.db "INSERT INTO screened_patents (patent_id, judgment, reason, abstract_text) VALUES ('US12231380B1', 'relevant', 'Related to chatbot-to-human transfer mechanism', 'A system for triggering transfer of conversations from a chatbot to a human agent based on conversation context.');"
sqlite3 patents.db "INSERT INTO claims (patent_id, claim_number, claim_type, claim_text) VALUES ('US12231380B1', 1, 'independent', '1. A computer-implemented method for managing conversations in a chatbot system, comprising: detecting a trigger condition in a conversation context; and transferring the conversation from the chatbot to a human agent based on the trigger condition.');"
sqlite3 patents.db "INSERT INTO elements (patent_id, claim_number, element_label, element_description) VALUES ('US12231380B1', 1, 'A', 'Detecting a trigger condition in a conversation context');"
sqlite3 patents.db "INSERT INTO elements (patent_id, claim_number, element_label, element_description) VALUES ('US12231380B1', 1, 'B', 'Transferring the conversation from the chatbot to a human agent based on the trigger condition');"
sqlite3 patents.db "INSERT INTO features (feature_name, description, category, presence) VALUES ('Conversation Context Monitoring', 'System monitors real-time conversation context and user sentiment', 'Core', 'present');"
"""

[answers]
"feature" = "Yes, the product has this feature."
"does the product have" = "Yes, the product has this feature."
"missing feature" = "Yes, the product has this feature."
"this feature" = "Yes, the product has this feature."

[[setup]]
path = "specification.md"
content = """
# Product Specification

## 1. Product Concept

AI-powered customer support chatbot with real-time sentiment analysis.

## 2. Target Market

- **Country**: US
- **Release Date**: 2025-12-31
- **Priority Date Cutoff**: 2005-12-31

## 3. Competitors

| Canonical Name       | Variations Found in DB     | Verified? | Notes         |
| -------------------- | -------------------------- | --------- | ------------- |
| Salesforce.Com, Inc. | salesforce.com, inc        | Yes       | Main assignee |

## 4. Technical Elements (Constituent Features)

- **LLM Dialogue Engine**: Multi-turn conversation management with context retention
- **Real-Time Sentiment Analysis**: Detects customer frustration and escalates to human agents
- **CRM Integration API**: Connects to Salesforce for ticket creation and customer history retrieval
"""

[[checks]]
name = "skill_loaded"
command = { command = "skill-loaded", skill = "claim-analyzing" }

[[checks]]
name = "claim_analyzing_invoked"
command = { command = "skill-invoked", skill = "claim-analyzing" }

[[checks]]
name = "question_responder_invoked"
command = { command = "skill-invoked", skill = "skill-bench-harness:question-responder" }

[[checks]]
name = "fetching_loaded"
command = { command = "skill-loaded", skill = "investigation-fetching" }

[[checks]]
name = "recording_loaded"
command = { command = "skill-loaded", skill = "investigation-recording" }

[[checks]]
name = "similarities_recorded"
command = { command = "db-query", db = "patents.db", query = "SELECT COUNT(*) FROM similarities;", expected = ">0" }

[[checks]]
name = "features_added"
command = { command = "db-query", db = "patents.db", query = "SELECT COUNT(*) FROM features;", expected = ">1" }
