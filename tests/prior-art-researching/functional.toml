# Test Case: Prior Art Researching Functional (with pre-seeded database)

name = "functional"
description = "Verify prior-art-researching skill with pre-populated similarities in database"
timeout = 300 # seconds

test_prompt = """
I have a patent database with Moderate and Significant similarity levels identified and a specification ready. Please conduct prior art research.
"""

[[setup]]
command = """
sqlite3 patents.db < /workspaces/patent-kit/plugin/skills/investigation-preparing/references/sql/initialize-database.sql
sqlite3 patents.db "INSERT INTO target_patents (patent_id, title, country, publication_date) VALUES ('US12231380B1', 'Trigger-based transfer of conversations from a chatbot to a human agent', 'US', '2023-10-11');"
sqlite3 patents.db "INSERT INTO screened_patents (patent_id, judgment, reason, abstract_text) VALUES ('US12231380B1', 'relevant', 'Related to chatbot-to-human transfer mechanism', 'A system for triggering transfer of conversations from a chatbot to a human agent based on conversation context.');"
sqlite3 patents.db "INSERT INTO claims (patent_id, claim_number, claim_type, claim_text) VALUES ('US12231380B1', 1, 'independent', 'A system comprising a chatbot engine, a trigger detection module, and a human agent transfer interface.');"
sqlite3 patents.db "INSERT INTO elements (patent_id, claim_number, element_label, element_description) VALUES ('US12231380B1', 1, 'A', 'Chatbot engine for multi-turn dialogue management');"
sqlite3 patents.db "INSERT INTO elements (patent_id, claim_number, element_label, element_description) VALUES ('US12231380B1', 1, 'B', 'Trigger detection module for conversation context analysis');"
sqlite3 patents.db "INSERT INTO similarities (patent_id, claim_number, element_label, similarity_level, analysis_notes) VALUES ('US12231380B1', 1, 'A', 'Significant', 'Closely matches target LLM Dialogue Engine feature');"
sqlite3 patents.db "INSERT INTO similarities (patent_id, claim_number, element_label, similarity_level, analysis_notes) VALUES ('US12231380B1', 1, 'B', 'Moderate', 'Partially matches target Sentiment Analysis feature');"
"""

[[setup]]
path = "specification.md"
content = """
# Product Specification

## 1. Product Concept

AI-powered customer support chatbot with real-time sentiment analysis.

## 2. Target Market

- **Country**: US
- **Release Date**: 2025-12-31
- **Priority Date Cutoff**: 2005-12-31

## 3. Competitors

| Canonical Name       | Variations Found in DB     | Verified? | Notes         |
| -------------------- | -------------------------- | --------- | ------------- |
| Salesforce.Com, Inc. | salesforce.com, inc        | Yes       | Main assignee |

## 4. Technical Elements (Constituent Features)

- **LLM Dialogue Engine**: Multi-turn conversation management with context retention
- **Real-Time Sentiment Analysis**: Detects customer frustration and escalates to human agents
- **CRM Integration API**: Connects to Salesforce for ticket creation and customer history retrieval
"""

[[checks]]
name = "skill_loaded"
command = { command = "skill-loaded", skill = "prior-art-researching" }

